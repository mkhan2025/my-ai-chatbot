<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Therapist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Tab Therapist</h1>
    <p id="tab-count" class="subtitle">—</p>
  </header>

  <div class="actions">
    <button id="analyze-btn" class="primary-btn">Analyze my tabs</button>
    <button id="save-session-btn" class="secondary-btn">Save session</button>
  </div>

  <div id="loading" class="hidden">Analyzing your tab chaos...</div>
  <div id="error" class="hidden error"></div>

  <div id="results" class="results hidden">
    <div id="shame-score" class="shame-score"></div>
    <div id="domain-breakdown" class="section"></div>
    <div id="read-now" class="section"></div>
    <div id="close-section" class="section"></div>
    <div id="anxiety-section" class="section"></div>
    <div id="next-action" class="next-action"></div>
  </div>

  <div id="sessions-panel" class="sessions-panel">
    <h2 class="section-title">Time Capsules</h2>
    <div id="sessions-list" class="sessions-list"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="sessions.js"></script>
  <script src="popup.js"></script>
</body>
</html>
